<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Control de Horas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="auth-container">
  <h2>Iniciar sesión</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>
  <button onclick="register()">Crear cuenta</button>
</div>

<!-- APP (OCULTA HASTA LOGIN) -->
<div id="app" style="display:none;">
  <div class="app-layout">
    <button id="mobileMenuToggle" class="mobile-menu-toggle" type="button" aria-label="Abrir menú" aria-expanded="false">
      ☰
    </button>
    <aside class="side-menu">
      <h3>Menú</h3>
      <button class="side-menu-btn active" data-panel="calendario">Calendario</button>
      <button class="side-menu-btn" data-panel="inicio">Detalles</button>
      <button class="side-menu-btn" data-panel="perfil">Perfil</button>
      <button class="side-menu-btn" data-panel="recibos">Recibos</button>
      <button class="btn-logout side-logout" onclick="logout()">Cerrar sesión</button>
    </aside>

    <main class="app-main">
      <section id="panel-inicio" class="side-view">
        <section class="dashboard">
          <div class="dashboard-cards">
            <div class="card-dashboard">
              <span class="label">💰 Total</span>
              <span class="value" id="totalMoney">$0</span>
            </div>

            <div class="card-dashboard">
              <span class="label">⏱ Horas</span>
              <span class="value" id="totalHours">—</span>
            </div>

            <div class="card-dashboard">
              <span class="label">📅 Período</span>
              <span class="value" id="periodo">--</span>
            </div>

            <!-- GRAFICO COMO CARD -->
            <div class="card-dashboard grafico-card">
              <span class="label">📊 Ingresos por mes</span>
              <canvas id="graficoMensual"></canvas>
            </div>
          </div>
        </section>

        <div class="container">
          <h1>🕒 Control de Horas</h1>

          <div class="meses-container">
            <button class="mes-btn" data-month="1">Ene</button>
            <button class="mes-btn" data-month="2">Feb</button>
            <button class="mes-btn" data-month="3">Mar</button>
            <button class="mes-btn" data-month="4">Abr</button>
            <button class="mes-btn" data-month="5">May</button>
            <button class="mes-btn" data-month="6">Jun</button>
            <button class="mes-btn" data-month="7">Jul</button>
            <button class="mes-btn" data-month="8">Ago</button>
            <button class="mes-btn" data-month="9">Sep</button>
            <button class="mes-btn" data-month="10">Oct</button>
            <button class="mes-btn" data-month="11">Nov</button>
            <button class="mes-btn" data-month="12">Dic</button>
          </div>

          <label>Fecha</label>
          <input type="date" id="date">

          <label>Hora inicio</label>
          <input type="time" id="start">

          <label>Hora fin</label>
          <input type="time" id="end">

          <label>Sector</label>
          <select id="sector">
            <option value="">Seleccionar sector</option>
            <option value="Urgencia Domiciliaria">Urgencia Domiciliaria</option>
            <option value="Triage">Triage</option>
          </select>

          <button onclick="guardarHoras()">Guardar horas</button>
          <p id="mensajeExito" class="mensaje-exito oculto">
            ✅ Hora guardada correctamente
          </p>
          <p id="mensajeBorrado" class="mensaje-exito oculto">
            🗑 Hora eliminada correctamente
          </p>
          <h2>Detalle de Horas</h2>
          <div class="detalle-card">
            <div id="resultado"></div>
          </div>
        </div>
      </section>

      <section id="panel-perfil" class="menu-panel side-view">
          <h3>Perfil</h3>
          <label>Dirección</label>
          <input type="text" id="profileAddress" placeholder="Ej: Calle 123, Ciudad">

          <label>Teléfono</label>
          <input type="tel" id="profilePhone" placeholder="Ej: +54 9 11 1234-5678">

          <label>Fecha de nacimiento</label>
          <input type="date" id="profileBirthDate">

          <button id="saveProfileBtn" type="button">Guardar perfil</button>
      </section>

      <section id="panel-calendario" class="menu-panel side-view active">
          <h3>Calendario</h3>
          <p class="panel-help">Los días trabajados se marcan en naranja.</p>
          <div class="calendar-controls">
            <select id="calendarMonthSelect">
              <option value="1">Enero</option>
              <option value="2">Febrero</option>
              <option value="3">Marzo</option>
              <option value="4">Abril</option>
              <option value="5">Mayo</option>
              <option value="6">Junio</option>
              <option value="7">Julio</option>
              <option value="8">Agosto</option>
              <option value="9">Septiembre</option>
              <option value="10">Octubre</option>
              <option value="11">Noviembre</option>
              <option value="12">Diciembre</option>
            </select>
            <input type="number" id="calendarYearInput" min="2000" max="2100" placeholder="Año">
            <button id="calendarApplyBtn" type="button">Ver</button>
          </div>
          <div id="workCalendar" class="work-calendar"></div>
      </section>

      <section id="panel-recibos" class="menu-panel side-view">
          <h3>Recibos</h3>
          <label>Agregar PDF o foto</label>
          <input type="file" id="receiptInput" accept=".pdf,image/*" multiple>
          <div id="receiptList" class="receipt-list"></div>
      </section>
    </main>
  </div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
